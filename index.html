<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBoard - Die freie Padlet-Alternative</title>
    <!-- React & Babel UMD für Single-File-Ausführung -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Sicherer Speicher-Wrapper, um SecurityErrors im Sandbox-Modus zu verhindern
        const safeStorage = {
            getItem: (key) => {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.warn("Storage-Zugriff verweigert, weiche auf Speicher aus.", e);
                    return safeStorage._memory[key] || null;
                }
            },
            setItem: (key, value) => {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.warn("Storage-Schreiben verweigert, nutze Speicher-Fallback.", e);
                    safeStorage._memory[key] = value;
                }
            },
            _memory: {}
        };

        // Farb-Definitionen für die Kärtchen
        const CARD_COLORS = [
            { id: 'bg-white', name: 'Standard (Weiß)', text: 'text-slate-800', border: 'border-slate-200' },
            { id: 'bg-amber-100', name: 'Gelb', text: 'text-amber-900', border: 'border-amber-200' },
            { id: 'bg-rose-100', name: 'Rot', text: 'text-rose-900', border: 'border-rose-200' },
            { id: 'bg-emerald-100', name: 'Grün', text: 'text-emerald-900', border: 'border-emerald-200' },
            { id: 'bg-sky-100', name: 'Blau', text: 'text-sky-900', border: 'border-sky-200' },
            { id: 'bg-purple-100', name: 'Lila', text: 'text-purple-900', border: 'border-purple-200' },
        ];

        // Hintergrund-Gradients für das Board
        const BOARD_BACKGROUNDS = [
            { id: 'from-blue-50 to-indigo-50', name: 'Sanftes Blau', css: 'bg-gradient-to-br from-blue-50 to-indigo-50' },
            { id: 'from-emerald-50 to-teal-50', name: 'Natur-Grün', css: 'bg-gradient-to-br from-emerald-50 to-teal-50' },
            { id: 'from-rose-50 to-amber-50', name: 'Warmer Sonnenuntergang', css: 'bg-gradient-to-br from-rose-50 to-amber-50' },
            { id: 'from-slate-100 to-slate-200', name: 'Klassisches Grau', css: 'bg-gradient-to-br from-slate-100 to-slate-200' },
            { id: 'from-violet-50 to-fuchsia-50', name: 'Flieder-Traum', css: 'bg-gradient-to-br from-violet-50 to-fuchsia-50' }
        ];

        function OpenBoardApp() {
            // --- STATE-MANAGEMENT ---
            const [supabaseUrl, setSupabaseUrl] = useState(safeStorage.getItem('ob_supabase_url') || '');
            const [supabaseKey, setSupabaseKey] = useState(safeStorage.getItem('ob_supabase_key') || '');
            const [dbMode, setDbMode] = useState('local'); // 'local' oder 'supabase'
            const [supabaseClient, setSupabaseClient] = useState(null);

            // Auth States
            const [session, setSession] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);

            // Daten-State
            const [boards, setBoards] = useState([]);
            const [activeBoardId, setActiveBoardId] = useState('');
            const [columns, setColumns] = useState([]);
            const [cards, setCards] = useState([]);
            const [comments, setComments] = useState([]);

            // UI-States
            const [isInitialLoading, setIsInitialLoading] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const [activeCardModal, setActiveCardModal] = useState(null); // Enthält Card-Objekt, wenn offen
            const [newBoardTitle, setNewBoardTitle] = useState('');
            const [newColumnTitle, setNewColumnTitle] = useState('');
            
            // Kommentare im Modal
            const [commentAuthor, setCommentAuthor] = useState(safeStorage.getItem('ob_author_name') || 'Anonym');
            const [newCommentText, setNewCommentText] = useState('');

            // Custom UI Notification System (Ersetzt alert() und confirm())
            const [toast, setToast] = useState(null); // { message: string, type: 'info' | 'success' | 'error' }
            const [confirmModal, setConfirmModal] = useState(null); // { title: string, message: string, onConfirm: fn, onCancel: fn }

            const triggerToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const triggerConfirm = (title, message, onConfirm) => {
                setConfirmModal({
                    title,
                    message,
                    onConfirm: () => {
                        onConfirm();
                        setConfirmModal(null);
                    },
                    onCancel: () => setConfirmModal(null)
                });
            };

            // --- LOCAL STORAGE DATA (FALLBACK) ---
            const getLocalData = (key, defaultVal = []) => {
                const data = safeStorage.getItem(key);
                return data ? JSON.parse(data) : defaultVal;
            };

            const saveLocalData = (key, data) => {
                safeStorage.setItem(key, JSON.stringify(data));
            };

            // --- INITIALISIERUNG DB & DATEN ---
            useEffect(() => {
                if (supabaseUrl && supabaseKey) {
                    try {
                        const globalSupabase = window.supabase || window.Supabase;
                        if (globalSupabase) {
                            const client = globalSupabase.createClient(supabaseUrl, supabaseKey);
                            setSupabaseClient(client);
                            setDbMode('supabase');
                            triggerToast("Erfolgreich mit Supabase verbunden!", "success");
                        } else {
                            console.error("Supabase-Bibliothek im Window-Objekt fehlt.");
                            setDbMode('local');
                        }
                    } catch (err) {
                        console.error("Supabase-Verbindung fehlgeschlagen:", err);
                        setDbMode('local');
                        triggerToast("Verbindung mit Supabase fehlgeschlagen. Lokaler Modus aktiv.", "error");
                    }
                } else {
                    setDbMode('local');
                }
            }, [supabaseUrl, supabaseKey]);

            // Supabase Auth Listener
            useEffect(() => {
                if (dbMode === 'supabase' && supabaseClient) {
                    // Aktuelle Session abrufen
                    supabaseClient.auth.getSession().then(({ data: { session } }) => {
                        setSession(session);
                    });

                    // Auf Änderungen hören
                    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                        setSession(session);
                    });

                    return () => subscription.unsubscribe();
                }
            }, [dbMode, supabaseClient]);

            // Laden der Daten basierend auf dem Modus
            useEffect(() => {
                const loadData = async () => {
                    setIsInitialLoading(true);
                    if (dbMode === 'supabase' && supabaseClient) {
                        await fetchFromSupabase();
                    } else {
                        // LocalStorage Fallback Daten
                        const localBoards = getLocalData('ob_boards', [
                            { id: 'board-1', title: 'Willkommens-Board 🚀', description: 'Dein erstes OpenBoard. Du kannst dieses bearbeiten oder neue erstellen!', background: 'from-blue-50 to-indigo-50' }
                        ]);
                        const localColumns = getLocalData('ob_columns', [
                            { id: 'col-1', board_id: 'board-1', title: 'Zu Erledigen 📝', position: 0 },
                            { id: 'col-2', board_id: 'board-1', title: 'In Arbeit 🛠️', position: 1 },
                            { id: 'col-3', board_id: 'board-1', title: 'Fertig 🎉', position: 2 }
                        ]);
                        const localCards = getLocalData('ob_cards', [
                            { id: 'card-1', column_id: 'col-1', title: 'Willkommen bei OpenBoard!', content: 'Das ist ein Kärtchen. Klicke auf mich, um Kommentare zu lesen, Anhänge zu öffnen oder mich zu editieren!', color: 'bg-amber-100', attachment_url: 'https://github.com', likes: 2, position: 0 }
                        ]);
                        const localComments = getLocalData('ob_comments', [
                            { id: 'com-1', card_id: 'card-1', author: 'Entwickler', content: 'Klasse, dass du dich für Open-Source entscheidest!' }
                        ]);

                        setBoards(localBoards);
                        setColumns(localColumns);
                        setCards(localCards);
                        setComments(localComments);

                        if (localBoards.length > 0 && !activeBoardId) {
                            setActiveBoardId(localBoards[0].id);
                        }
                    }
                    setIsInitialLoading(false);
                };

                loadData();
            }, [dbMode, supabaseClient]);

            // Realtime Subscription bei Supabase aktivieren
            useEffect(() => {
                if (dbMode === 'supabase' && supabaseClient && activeBoardId) {
                    const channel = supabaseClient
                        .channel('schema-db-changes')
                        .on('postgres_changes', { event: '*', schema: 'public' }, () => {
                            fetchFromSupabase();
                        })
                        .subscribe();

                    return () => {
                        supabaseClient.removeChannel(channel);
                    };
                }
            }, [dbMode, supabaseClient, activeBoardId]);

            const fetchFromSupabase = async () => {
                if (!supabaseClient) return;
                try {
                    const { data: boardsData, error: bErr } = await supabaseClient.from('boards').select('*').order('created_at', { ascending: true });
                    if (bErr) throw bErr;
                    setBoards(boardsData);

                    let currentBoard = activeBoardId;
                    if (boardsData.length > 0 && !currentBoard) {
                        currentBoard = boardsData[0].id;
                        setActiveBoardId(currentBoard);
                    }

                    if (currentBoard) {
                        const { data: columnsData, error: cErr } = await supabaseClient.from('columns').select('*').eq('board_id', currentBoard).order('position', { ascending: true });
                        if (cErr) throw cErr;
                        setColumns(columnsData);

                        const columnIds = columnsData.map(col => col.id);

                        if (columnIds.length > 0) {
                            const { data: cardsData, error: cardErr } = await supabaseClient.from('cards').select('*').in('column_id', columnIds).order('position', { ascending: true });
                            if (cardErr) throw cardErr;
                            setCards(cardsData);

                            const cardIds = cardsData.map(c => c.id);
                            if (cardIds.length > 0) {
                                const { data: commentsData, error: comErr } = await supabaseClient.from('comments').select('*').in('card_id', cardIds).order('created_at', { ascending: true });
                                if (comErr) throw comErr;
                                setComments(commentsData);
                            } else {
                                setComments([]);
                            }
                        } else {
                            setCards([]);
                            setComments([]);
                        }
                    }
                } catch (err) {
                    console.error("Fehler beim Laden von Supabase:", err);
                }
            };

            // --- AUTH LOGIK ---
            const handleAuth = async (e) => {
                e.preventDefault();
                if (!authEmail || !authPassword) return;

                if (dbMode === 'supabase' && supabaseClient) {
                    try {
                        if (isRegistering) {
                            const { error } = await supabaseClient.auth.signUp({
                                email: authEmail,
                                password: authPassword,
                            });
                            if (error) throw error;
                            triggerToast("Registrierung erfolgreich! Bitte überprüfe dein E-Mail-Postfach zur Bestätigung.", "success");
                        } else {
                            const { error } = await supabaseClient.auth.signInWithPassword({
                                email: authEmail,
                                password: authPassword,
                            });
                            if (error) throw error;
                            triggerToast("Erfolgreich angemeldet!", "success");
                        }
                        setShowAuthModal(false);
                    } catch (err) {
                        triggerToast(err.message, "error");
                    }
                } else {
                    // Lokale Fallback-Sitzung
                    setSession({ user: { email: authEmail } });
                    triggerToast(isRegistering ? "Lokaler Test-Account registriert!" : "Erfolgreich lokal angemeldet!", "success");
                    setShowAuthModal(false);
                }
            };

            const handleLogout = async () => {
                if (dbMode === 'supabase' && supabaseClient) {
                    await supabaseClient.auth.signOut();
                } else {
                    setSession(null);
                }
                triggerToast("Erfolgreich abgemeldet.", "info");
            };

            // --- BOARD CRUD ---
            const createBoard = async () => {
                // Prüfen ob eingeloggt
                if (!session) {
                    triggerToast("Du musst angemeldet sein, um ein neues Board zu erstellen!", "error");
                    setShowAuthModal(true);
                    return;
                }

                if (!newBoardTitle.trim()) return;
                const newBoard = {
                    title: newBoardTitle,
                    description: 'Eine neue Pinnwand',
                    background: 'from-blue-50 to-indigo-50',
                    owner_id: session.user.id || null
                };

                if (dbMode === 'supabase') {
                    const { data, error } = await supabaseClient.from('boards').insert([newBoard]).select();
                    if (error) {
                        console.error(error);
                        triggerToast("Fehler beim Erstellen des Boards auf Supabase", "error");
                    } else {
                        setActiveBoardId(data[0].id);
                        fetchFromSupabase();
                        triggerToast("Neues Board erfolgreich erstellt!", "success");
                    }
                } else {
                    const localNewBoard = { ...newBoard, id: 'board-' + Date.now() };
                    const updated = [...boards, localNewBoard];
                    setBoards(updated);
                    saveLocalData('ob_boards', updated);
                    setActiveBoardId(localNewBoard.id);
                    triggerToast("Lokales Board erstellt!", "success");
                }
                setNewBoardTitle('');
            };

            const updateBoardSettings = async (title, desc, bg) => {
                if (dbMode === 'supabase') {
                    const { error } = await supabaseClient.from('boards').update({ title, description: desc, background: bg }).eq('id', activeBoardId);
                    if (error) console.error(error);
                    else fetchFromSupabase();
                } else {
                    const updated = boards.map(b => b.id === activeBoardId ? { ...b, title, description: desc, background: bg } : b);
                    setBoards(updated);
                    saveLocalData('ob_boards', updated);
                }
            };

            const deleteActiveBoard = () => {
                triggerConfirm(
                    "Board löschen?", 
                    "Möchtest du dieses Board wirklich mitsamt allen Spalten und Kärtchen unwiderruflich löschen?",
                    async () => {
                        if (dbMode === 'supabase') {
                            const { error } = await supabaseClient.from('boards').delete().eq('id', activeBoardId);
                            if (error) {
                                console.error(error);
                                triggerToast("Fehler beim Löschen des Boards", "error");
                            } else {
                                setActiveBoardId('');
                                fetchFromSupabase();
                                triggerToast("Board gelöscht", "info");
                            }
                        } else {
                            const updatedBoards = boards.filter(b => b.id !== activeBoardId);
                            const activeCols = columns.filter(c => c.board_id === activeBoardId).map(c => c.id);
                            const updatedCols = columns.filter(c => c.board_id !== activeBoardId);
                            const updatedCards = cards.filter(card => !activeCols.includes(card.column_id));
                            
                            setBoards(updatedBoards);
                            setColumns(updatedCols);
                            setCards(updatedCards);

                            saveLocalData('ob_boards', updatedBoards);
                            saveLocalData('ob_columns', updatedCols);
                            saveLocalData('ob_cards', updatedCards);

                            if (updatedBoards.length > 0) {
                                setActiveBoardId(updatedBoards[0].id);
                            } else {
                                setActiveBoardId('');
                            }
                            triggerToast("Board gelöscht", "info");
                        }
                    }
                );
            };

            // --- SPALTEN CRUD ---
            const createColumn = async () => {
                if (!newColumnTitle.trim() || !activeBoardId) return;
                const nextPos = columns.length;
                const newCol = {
                    board_id: activeBoardId,
                    title: newColumnTitle,
                    position: nextPos
                };

                if (dbMode === 'supabase') {
                    const { error } = await supabaseClient.from('columns').insert([newCol]);
                    if (error) console.error(error);
                    else fetchFromSupabase();
                } else {
                    const localNewCol = { ...newCol, id: 'col-' + Date.now() };
                    const updated = [...columns, localNewCol];
                    setColumns(updated);
                    saveLocalData('ob_columns', updated);
                }
                setNewColumnTitle('');
            };

            const deleteColumn = (colId) => {
                triggerConfirm(
                    "Spalte löschen?",
                    "Möchtest du diese Spalte mitsamt allen darin liegenden Kärtchen löschen?",
                    async () => {
                        if (dbMode === 'supabase') {
                            const { error } = await supabaseClient.from('columns').delete().eq('id', colId);
                            if (error) console.error(error);
                            else fetchFromSupabase();
                        } else {
                            const updatedCols = columns.filter(c => c.id !== colId);
                            const updatedCards = cards.filter(c => c.column_id !== colId);
                            setColumns(updatedCols);
                            setCards(updatedCards);
                            saveLocalData('ob_columns', updatedCols);
                            saveLocalData('ob_cards', updatedCards);
                            triggerToast("Spalte gelöscht", "info");
                        }
                    }
                );
            };

            const renameColumn = async (colId, newTitle) => {
                if (!newTitle.trim()) return;
                if (dbMode === 'supabase') {
                    const { error } = await supabaseClient.from('columns').update({ title: newTitle }).eq('id', colId);
                    if (error) console.error(error);
                } else {
                    const updated = columns.map(c => c.id === colId ? { ...c, title: newTitle } : c);
                    setColumns(updated);
                    saveLocalData('ob_columns', updated);
                }
            };

            // --- KÄRTCHEN CRUD ---
            const createCard = async (columnId) => {
                const newCard = {
                    column_id: columnId,
                    title: 'Neues Kärtchen',
                    content: 'Klicke zum Bearbeiten...',
                    color: 'bg-white',
                    attachment_url: '',
                    likes: 0,
                    position: cards.filter(c => c.column_id === columnId).length
                };

                if (dbMode === 'supabase') {
                    const { data, error } = await supabaseClient.from('cards').insert([newCard]).select();
                    if (error) console.error(error);
                    else {
                        fetchFromSupabase();
                        setActiveCardModal(data[0]);
                    }
                } else {
                    const localNewCard = { ...newCard, id: 'card-' + Date.now() };
                    const updated = [...cards, localNewCard];
                    setCards(updated);
                    saveLocalData('ob_cards', updated);
                    setActiveCardModal(localNewCard);
                }
            };

            const updateCardDetail = async (cardId, fields) => {
                if (dbMode === 'supabase') {
                    const { error } = await supabaseClient.from('cards').update(fields).eq('id', cardId);
                    if (error) console.error(error);
                    else {
                        fetchFromSupabase();
                        if (activeCardModal && activeCardModal.id === cardId) {
                            setActiveCardModal(prev => ({ ...prev, ...fields }));
                        }
                    }
                } else {
                    const updated = cards.map(c => c.id === cardId ? { ...c, ...fields } : c);
                    setCards(updated);
                    saveLocalData('ob_cards', updated);
                    if (activeCardModal && activeCardModal.id === cardId) {
                        setActiveCardModal(prev => ({ ...prev, ...fields }));
                    }
                }
            };

            const deleteCard = (cardId) => {
                triggerConfirm(
                    "Kärtchen löschen?",
                    "Möchtest du dieses Kärtchen wirklich löschen?",
                    async () => {
                        if (dbMode === 'supabase') {
                            const { error } = await supabaseClient.from('cards').delete().eq('id', cardId);
                            if (error) console.error(error);
                            else {
                                setActiveCardModal(null);
                                fetchFromSupabase();
                                triggerToast("Kärtchen gelöscht", "info");
                            }
                        } else {
                            const updated = cards.filter(c => c.id !== cardId);
                            const updatedComments = comments.filter(com => com.card_id !== cardId);
                            setCards(updated);
                            setComments(updatedComments);
                            saveLocalData('ob_cards', updated);
                            saveLocalData('ob_comments', updatedComments);
                            setActiveCardModal(null);
                            triggerToast("Kärtchen gelöscht", "info");
                        }
                    }
                );
            };

            const addLike = async (cardId, currentLikes) => {
                const newLikes = (currentLikes || 0) + 1;
                if (dbMode === 'supabase') {
                    const { error } = await supabaseClient.from('cards').update({ likes: newLikes }).eq('id', cardId);
                    if (error) console.error(error);
                    else fetchFromSupabase();
                } else {
                    const updated = cards.map(c => c.id === cardId ? { ...c, likes: newLikes } : c);
                    setCards(updated);
                    saveLocalData('ob_cards', updated);
                }
            };

            // --- KOMMENTARE ---
            const addComment = async (cardId) => {
                if (!newCommentText.trim()) return;
                const newCom = {
                    card_id: cardId,
                    author: commentAuthor || 'Anonym',
                    content: newCommentText
                };

                safeStorage.setItem('ob_author_name', commentAuthor);

                if (dbMode === 'supabase') {
                    const { error } = await supabaseClient.from('comments').insert([newCom]);
                    if (error) console.error(error);
                    else {
                        setNewCommentText('');
                        fetchFromSupabase();
                    }
                } else {
                    const localNewCom = { ...newCom, id: 'com-' + Date.now(), created_at: new Date().toISOString() };
                    const updated = [...comments, localNewCom];
                    setComments(updated);
                    saveLocalData('ob_comments', updated);
                    setNewCommentText('');
                }
            };

            // --- BEWEGUNGS-HILFEN PER BUTTONS ---
            const moveCard = async (cardId, direction) => {
                const cardIndex = cards.findIndex(c => c.id === cardId);
                if (cardIndex === -1) return;
                const card = cards[cardIndex];
                const siblings = cards.filter(c => c.column_id === card.column_id).sort((a, b) => a.position - b.position);
                const posInSiblings = siblings.findIndex(c => c.id === cardId);

                if (direction === 'up' && posInSiblings > 0) {
                    const swapWith = siblings[posInSiblings - 1];
                    await updateCardDetail(card.id, { position: swapWith.position });
                    await updateCardDetail(swapWith.id, { position: card.position });
                } else if (direction === 'down' && posInSiblings < siblings.length - 1) {
                    const swapWith = siblings[posInSiblings + 1];
                    await updateCardDetail(card.id, { position: swapWith.position });
                    await updateCardDetail(swapWith.id, { position: card.position });
                }
            };

            // --- BACKUP & EXPORT (JSON) ---
            const exportData = () => {
                const backup = { boards, columns, cards, comments };
                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `openboard-backup-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                triggerToast("Backup-Datei heruntergeladen!", "success");
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.boards && parsed.columns) {
                            if (dbMode === 'supabase') {
                                triggerToast("Importiere Daten im Demo-Modus. Cloud-Imports bitte direkt im SQL-Editor vornehmen.", "error");
                            } else {
                                setBoards(parsed.boards || []);
                                setColumns(parsed.columns || []);

create extension if not exists "uuid-ossp";

create table if not exists boards (

  created_at timestamp with time zone default timezone('utc'::text, now()) not null,

);

create table if not exists columns (

  board_id uuid references boards(id) on delete cascade not null,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null,
  title text not null,
  position int not null default 0
);

create table if not exists cards (

  column_id uuid references columns(id) on delete cascade not null,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null,

create table if not exists comments (

  author text not null default 'Anonym',
  content text not null
);

alter publication supabase_realtime add table boards, columns, cards, comments;`;

                                                onClick={() => { 
                                                    document.execCommand('copy'); 
                                                    triggerToast("SQL-Skript kopiert!", "success");
                                                }} 
                                                className="text-xs text-indigo-600 font-semibold hover:underline"
                                            >
                                                Skript kopieren
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-500 leading-relaxed">Führe dieses Skript im SQL Editor deines Supabase-Projekts aus.</p>
                                        <pre className="text-[10px] bg-slate-900 text-slate-100 p-3 rounded-lg overflow-x-auto max-h-40 font-mono">
                                            {SQL_SCHEMA}
                                        </pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- DETAILS & BEARBEITUNGS MODAL FÜR KÄRTCHEN --- */}
                    {activeCardModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row max-h-[90vh]">
                                
                                {/* Linker Teil: Kärtchen-Inhalt */}
                                <div className="flex-1 p-6 border-b md:border-b-0 md:border-r border-slate-200 overflow-y-auto space-y-4">
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs font-bold text-indigo-600 uppercase tracking-wider">Kärtchen bearbeiten</span>
                                        <div className="flex gap-1.5">
                                            {CARD_COLORS.map(color => (
                                                <button 
                                                    key={color.id}
                                                    onClick={() => updateCardDetail(activeCardModal.id, { color: color.id })}
                                                    className={`w-5 h-5 rounded-full border ${color.id} ${activeCardModal.color === color.id ? 'border-slate-800 ring-2 ring-slate-400' : 'border-slate-300'}`}
                                                    title={color.name}
                                                />
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Titel</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none font-semibold text-lg"
                                            value={activeCardModal.title}
                                            onChange={(e) => updateCardDetail(activeCardModal.id, { title: e.target.value })}
                                        />
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Beschreibung</label>
                                        <textarea 
                                            className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm h-36 resize-y"
                                            value={activeCardModal.content}
                                            onChange={(e) => updateCardDetail(activeCardModal.id, { content: e.target.value })}
                                        />
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Anhang-Link (URL)</label>
                                        <input 
                                            type="text" 
                                            placeholder="https://beispiel.de"
                                            className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm font-mono"
                                            value={activeCardModal.attachment_url || ''}
                                            onChange={(e) => updateCardDetail(activeCardModal.id, { attachment_url: e.target.value })}
                                        />
                                    </div>

                                    <div className="pt-2 flex justify-between items-center">
                                        <button 
                                            onClick={() => deleteCard(activeCardModal.id)}
                                            className="text-rose-600 hover:text-rose-700 text-xs font-bold uppercase tracking-wider flex items-center gap-1.5"
                                        >
                                            <i className="fa-solid fa-trash-can"></i>
                                            Kärtchen Löschen
                                        </button>
                                        
                                        <button 
                                            onClick={() => setActiveCardModal(null)}
                                            className="bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold uppercase tracking-wider px-4 py-2.5 rounded-xl transition"
                                        >
                                            Schließen
                                        </button>
                                    </div>
                                </div>

                                {/* Rechter Teil: Kommentare */}
                                <div className="w-full md:w-80 bg-slate-50 p-6 flex flex-col justify-between max-h-96 md:max-h-none overflow-y-auto">
                                    <div className="space-y-4 flex-1 overflow-y-auto">
                                        <h3 className="font-bold text-slate-800 flex items-center gap-2">
                                            <i className="fa-regular fa-comments text-indigo-600"></i>
                                            Kommentare
                                        </h3>

                                        <div className="space-y-2 max-h-[250px] overflow-y-auto pr-1">
                                            {comments.filter(com => com.card_id === activeCardModal.id).map(com => (
                                                <div key={com.id} className="bg-white p-3 rounded-xl border border-slate-200 shadow-sm text-xs">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="font-bold text-slate-700">{com.author}</span>
                                                    </div>
                                                    <p className="text-slate-600">{com.content}</p>
                                                </div>
                                            ))}
                                            {comments.filter(com => com.card_id === activeCardModal.id).length === 0 && (
                                                <div className="text-center py-6 text-slate-400 text-xs">
                                                    Keine Kommentare vorhanden.
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Kommentar schreiben */}
                                    <div className="pt-4 border-t border-slate-200 space-y-2 mt-4">
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                placeholder="Name"
                                                className="w-1/3 px-2 py-1 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none font-semibold"
                                                value={commentAuthor}
                                                onChange={(e) => setCommentAuthor(e.target.value)}
                                            />
                                            <span className="text-xs text-slate-400 self-center">schreibt:</span>
                                        </div>
                                        <div className="flex gap-1">
                                            <input 
                                                type="text" 
                                                placeholder="Kommentar verfassen..."
                                                className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                value={newCommentText}
                                                onChange={(e) => setNewCommentText(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && addComment(activeCardModal.id)}
                                            />
                                            <button 
                                                onClick={() => addComment(activeCardModal.id)}
                                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-xs transition"
                                            >
                                                <i className="fa-solid fa-paper-plane"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OpenBoardApp />);
    </script>
</body>
</html>
